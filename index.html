        // ===================== 题库结束 =====================

        // 全局变量
        let currentQuestionList = []; // 当前抽取的10道题
        let currentIndex = 0; // 当前题号（从0开始）
        let totalScore = 0; // 累计得分
        let selectedAnswer = []; // 用户当前选中的答案
        let isAnswered = false; // 当前题是否已作答

        // 初始化页面
        window.onload = function() {
            // 随机抽取一组题库
            const randomGroupIndex = Math.floor(Math.random() * questionGroups.length);
            currentQuestionList = questionGroups[randomGroupIndex];
            // 渲染第一题
            renderQuestion();
            // 绑定按钮事件
            bindBtnEvent();
        };

        // 渲染当前题目
        function renderQuestion() {
            const container = document.getElementById("questionContainer");
            const currentQuestion = currentQuestionList[currentIndex];
            selectedAnswer = [];
            isAnswered = false;

            // 更新进度和得分
            document.getElementById("currentIndex").innerText = currentIndex + 1;
            document.getElementById("currentScore").innerText = totalScore;
            // 重置按钮和提示
            document.getElementById("actionBtn").innerText = "提交本题答案";
            document.getElementById("actionBtn").disabled = false;
            document.getElementById("answerTip").className = "answer-tip";
            document.getElementById("answerTip").innerText = "";

            // 渲染题目HTML
            let html = `<div class="question-item">
                <div class="question-title">${currentQuestion.title}</div>
                <div class="option-list">`;
            
            currentQuestion.options.forEach(option => {
                const optionValue = option.split(".")[0];
                html += `<div class="option-item">
                    <label>
                        <input type="radio" name="currentQuestion" value="${optionValue}">
                        ${option}
                    </label>
                </div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;

            // 绑定选项选择事件
            bindOptionEvent();
        }

        // 绑定选项选择事件
        function bindOptionEvent() {
            const allInputs = document.querySelectorAll(".option-item input");
            allInputs.forEach(input => {
                input.addEventListener("change", function() {
                    if (isAnswered) return; // 已作答后禁止修改
                    const parent = this.closest(".option-item");
                    // 单选清除其他选中样式
                    document.querySelectorAll(".option-item").forEach(item => {
                        item.classList.remove("selected");
                    });
                    // 记录当前选择
                    selectedAnswer = [this.value];
                    parent.classList.add("selected");
                });
            });
        }

        // 绑定按钮事件
        function bindBtnEvent() {
            document.getElementById("actionBtn").addEventListener("click", function() {
                // 未作答状态：提交答案
                if (!isAnswered) {
                    if (selectedAnswer.length === 0) {
                        alert("请选择你的答案！");
                        return;
                    }
                    submitAnswer();
                } 
                // 已作答状态：进入下一题
                else {
                    // 判断是否是最后一题
                    if (currentIndex === currentQuestionList.length - 1) {
                        showFinalResult();
                    } else {
                        currentIndex++;
                        renderQuestion();
                    }
                }
            });
        }

        // 提交答案并判分
        function submitAnswer() {
            isAnswered = true;
            const currentQuestion = currentQuestionList[currentIndex];
            const tipBox = document.getElementById("answerTip");
            const allOptions = document.querySelectorAll(".option-item");

            // 禁用选项
            allOptions.forEach(item => {
                item.classList.add("disabled");
            });

            // 判断对错
            const isRight = selectedAnswer.sort().join(",") === currentQuestion.answer.sort().join(",");
            
            // 标记正确/错误选项
            allOptions.forEach(item => {
                const input = item.querySelector("input");
                const optionValue = input.value;
                // 正确答案标绿
                if (currentQuestion.answer.includes(optionValue)) {
                    item.classList.add("correct");
                }
                // 用户选错的标红
                if (selectedAnswer.includes(optionValue) && !currentQuestion.answer.includes(optionValue)) {
                    item.classList.add("wrong");
                }
            });

            // 累计得分
            if (isRight) {
                totalScore += currentQuestion.score;
                tipBox.className = "answer-tip tip-correct";
                tipBox.innerText = "✅ 回答正确！+" + currentQuestion.score + "分";
            } else {
                tipBox.className = "answer-tip tip-wrong";
                tipBox.innerText = "❌ 回答错误！正确答案：" + currentQuestion.answer.join("、");
            }

            // 更新按钮文本
            if (currentIndex === currentQuestionList.length - 1) {
                document.getElementById("actionBtn").innerText = "查看最终结果";
            } else {
                document.getElementById("actionBtn").innerText = "进入下一题";
            }
        }

        // 显示最终结果
        function showFinalResult() {
            // 隐藏答题区域
            document.getElementById("progressBox").style.display = "none";
            document.getElementById("questionContainer").style.display = "none";
            document.getElementById("answerTip").style.display = "none";
            document.getElementById("actionBtn").style.display = "none";

            // 判断是否通关
            if (totalScore >= 80) {
                document.getElementById("finalSuccessScore").innerText = totalScore;
                document.getElementById("successPanel").style.display = "block";
            } else {
                document.getElementById("finalFailScore").innerText = totalScore;
                document.getElementById("failPanel").style.display = "block";
            }
        }
    </script>
